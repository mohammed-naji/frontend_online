<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <form action="">
    <div>
      <label>Name <sup>*</sup></label>
      <input type="text" id="name" class="req" placeholder="Your name..">
      <small>This field is required</small>
    </div>

    <div>
      <label>Email <sup>*</sup></label>
      <input type="email" id="email" class="req" placeholder="Your email..">
      <small>This field is required</small>
    </div>

    <div>
      <label>Phone <sup>*</sup></label>
      <input type="text" class="req" placeholder="Your phone..">
      <small>This field is required</small>
    </div>

    <div>
      <label>Date of Birth</label>
      <input type="date" placeholder="Your phone..">
    </div>

    <button>Register</button>

    <a href="https://google.ps">Google</a>
  </form>

  <div class="parent">
    <div class="child"></div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
